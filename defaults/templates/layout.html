<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>go-grip - markdown preview</title>
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico" />
    <link
      id="theme-light"
      rel="stylesheet"
      href="/static/css/github-markdown-light.css"
      media="(prefers-color-scheme: light)"
    />
    <link
      id="theme-dark"
      rel="stylesheet"
      href="/static/css/github-markdown-dark.css"
      media="(prefers-color-scheme: dark)"
    />
    <style id="highlight-light" media="(prefers-color-scheme: light)">{{ .CssCodeLight }}</style>
    <style id="highlight-dark" media="(prefers-color-scheme: dark)">{{ .CssCodeDark }}</style>
    <link rel="stylesheet" href="/static/css/github-print.css" media="print" />
    <link rel="stylesheet" href="/static/css/github-mermaid.css" />
    <link rel="stylesheet" href="/static/css/github-clipboard.css" />
    <link rel="stylesheet" href="/static/css/mathjax.css" />
    <link rel="stylesheet" href="/static/css/theme-switch.css" />
    <link rel="stylesheet" href="/static/css/docs-layout.css" />
    <script src="/static/js/theme-switch.js"></script>
    <script src="/static/js/clipboard-copy.js"></script>
    <script src="/static/js/mathjax-options.js"></script>
    <script src="/static/js/tex-mml-chtml.js"></script>
    <script src="/static/js/mermaid.min.js"></script>
    <script src="/static/js/mermaid-init.js"></script>
    <script src="/static/js/toc-active.js"></script>
  </head>

  <body class="markdown-body">
    <button id="theme-toggle" class="theme-toggle" title="Toggle theme">
      <span class="theme-toggle-icon"></span>
    </button>
    <div class="docs-shell{{if .ShowSidebar}} docs-shell-sidebar{{end}}{{if .TOC}} docs-shell-toc{{end}}">
      {{if .ShowSidebar}}
      <aside class="docs-sidebar" aria-label="Markdown articles">
        <div class="docs-sidebar-title">Articles</div>
        {{if .Articles}}
        <nav>
          <ol>
            {{range .Articles}}
            <li>
              <a {{if .Active}}class="active" aria-current="page"{{end}} href="{{.Path}}">{{.Title}}</a>
            </li>
            {{end}}
          </ol>
        </nav>
        {{else}}
        <p class="docs-sidebar-empty">No Markdown files</p>
        {{end}}
      </aside>
      {{end}}

      <main class="docs-main">
        <div class="container">
          <div {{if .BoundingBox }} class="container-inner" {{end}}>
            {{ .Content }}
          </div>
        </div>
      </main>

      {{if .TOC}}
      <aside class="docs-toc" aria-label="Table of contents">
        <div class="docs-toc-title">On this page</div>
        <nav>
          <ol>
            {{range .TOC}}
            <li class="toc-level-{{.Level}}">
              <a href="#{{.ID}}">{{.Text}}</a>
            </li>
            {{end}}
          </ol>
        </nav>
      </aside>
      {{end}}
    </div>

    {{if .BoundingBox}}
    <footer class="container footer">
      <div class="docs-footer-inner">
        Made with &hearts; by chrishrb
      </div>
    </footer>
    {{end}}
  </body>
</html>
