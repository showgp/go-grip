name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true

      - name: Run tests
        run: go test ./...

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME:-snapshot}"
          mkdir -p dist

          targets=(
            "darwin amd64"
            "darwin arm64"
            "linux amd64"
            "linux arm64"
            "windows amd64"
            "windows arm64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<< "${target}"
            name="go-grip_${version}_${goos}_${goarch}"
            binary="go-grip"
            archive="${name}.tar.gz"

            if [[ "${goos}" == "windows" ]]; then
              binary="go-grip.exe"
              archive="${name}.zip"
            fi

            workdir="$(mktemp -d)"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" go build \
              -trimpath \
              -ldflags="-s -w" \
              -o "${workdir}/${binary}" \
              .

            cp LICENSE README.md "${workdir}/"

            if [[ "${goos}" == "windows" ]]; then
              (cd "${workdir}" && zip -q "../${archive}" "${binary}" LICENSE README.md)
              mv "$(dirname "${workdir}")/${archive}" "dist/${archive}"
            else
              tar -C "${workdir}" -czf "dist/${archive}" "${binary}" LICENSE README.md
            fi

            rm -rf "${workdir}"
          done

          (cd dist && sha256sum * > checksums.txt)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
